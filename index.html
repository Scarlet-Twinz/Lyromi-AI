<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyromi AI | Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-top">
                <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
            </div>
            <div id="history-list" class="history-area"></div>
            <div class="sidebar-footer">Built by Emmanuella</div>
        </aside>

        <main class="main-stage">
            <header class="top-nav">
                <button id="menu-toggle" class="mobile-only">☰</button>
                <span class="logo-text">Lyromi</span>
                <div class="user-circle">E</div>
            </header>

            <div id="welcome-screen" class="welcome-box">
                <h1 class="hero-text">Hello, Emmanuella</h1>
                <p class="hero-sub">How can I assist you today?</p>
            </div>

            <div id="chat-window"></div>

            <div class="bottom-area">
                <!-- MULTIMEDIA MENU -->
                <div id="media-menu" class="media-popover">
                    <button onclick="alert('Camera coming soon!')">📷 Camera</button>
                    <button onclick="alert('Video coming soon!')">🎥 Video</button>
                    <button onclick="document.getElementById('file-input').click()">📁 Files</button>
                    <input type="file" id="file-input" style="display:none" onchange="handleFileUpload(this)">
                </div>

                <div class="pill-wrapper">
                    <button id="plus-btn" class="action-btn" onclick="toggleMediaMenu()">+</button>
                    <button id="voice-btn" class="action-btn">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                    </button>
                    <input type="text" id="user-input" placeholder="Message Lyromi..." autocomplete="off">
                    <button id="send-btn" class="send-arrow">↑</button>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
