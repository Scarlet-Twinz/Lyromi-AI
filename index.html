<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyromi AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Android Style Header -->
        <header class="android-nav">
            <div class="nav-left">
                <img src="logo.png" class="nav-logo">
                <span>Lyromi</span>
            </div>
            <div class="nav-right">
                <button class="menu-btn">⋮</button>
            </div>
        </header>

        <main class="main-body">
            <div id="welcome-screen">
                <h1 class="gradient-text">Hello, I am Lyromi</h1>
                <p>How can I help you today, Emmanuella?</p>
            </div>

            <div id="chat-display"></div>

            <div class="input-area">
                <div class="input-pill">
                    <input type="text" id="user-input" placeholder="Message Lyromi..." autocomplete="off">
                    <button id="send-btn">↑</button>
                </div>
                <p class="footer-tag">Built by Emmanuella</p>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
